# config.example.toml — copy to config.toml and edit
# Secrets (UNIFI_URL, UNIFI_API_KEY, UNIFI_MCP_TOKEN) belong in .env, not here.
# All values here are overridden by environment variables.
# See .env.example for the full env-var reference.

[unifi]
# site = "default"
# skip_tls_verify = true      # required for self-signed UniFi certs
# legacy = false               # set true for older controllers on port 8443

[mcp]
host = "0.0.0.0"
port = 40030
server_name = "unifi-rmcp"
# allowed_hosts = ["unifi-rmcp.example.com"]
# allowed_origins = ["https://unifi-rmcp.example.com"]

[mcp.auth]
# mode = "bearer"              # or "oauth"
admin_email = ""
allowed_emails = []
sqlite_path = "/data/auth.db"
key_path = "/data/auth-jwt.pem"
access_token_ttl_secs = 3600
refresh_token_ttl_secs = 28800
auth_code_ttl_secs = 300
authorize_rpm = 60
disable_static_token_with_oauth = true
allowed_client_redirect_uris = []
