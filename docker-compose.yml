name: unifi-rmcp

# Local development stack. Builds from this checkout.
services:
  unifi-rmcp:
    extends:
      file: docker-compose.prod.yml
      service: unifi-rmcp
    image: unifi-rmcp:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  unifi-rmcp:
    name: ${DOCKER_NETWORK:-unifi-rmcp}
    external: true
